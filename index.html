<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Austin 2026</title>
<style>
body{background:#0D1B2A;color:#F0EDE8;font-family:sans-serif;padding:20px}
.semana{background:#1A2E42;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer}
.dias{display:none;padding:8px}
</style>
</head>
<body>
<h2 style="color:#E8733A">Austin Trip 2026</h2>
<div id="status" style="color:#D4A843;margin:10px 0">Carregando...</div>
<div id="container"></div>

<script>
document.getElementById('status').textContent = 'JS funcionando!';

var semanas = [
  'S1 - 07 a 13/06',
  'S2 - 14 a 20/06',
  'S3 - 21 a 27/06',
  'S4 - 28/06 a 02/07'
];

var c = document.getElementById('container');
semanas.forEach(function(s, i) {
  var div = document.createElement('div');
  div.className = 'semana';
  div.textContent = s;
  div.onclick = function() {
    var d = document.getElementById('dias-' + i);
    d.style.display = d.style.display === 'block' ? 'none' : 'block';
  };
  c.appendChild(div);
  var dias = document.createElement('div');
  dias.className = 'dias';
  dias.id = 'dias-' + i;
  dias.textContent = 'Dias da semana ' + (i+1);
  c.appendChild(dias);
});
</script>
</body>
</html>
